<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictions — Kepler.gl</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0c1118; display: flex; flex-direction: column; }
    .kepler-hint {
      flex-shrink: 0;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      color: #94a3b8;
      padding: 0.5rem 1rem;
      margin: 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      line-height: 1.45;
    }
    #frame-wrap { flex: 1; min-height: 0; width: 100%; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .msg {
      font-family: system-ui, sans-serif;
      color: #94a3b8;
      padding: 2rem;
      max-width: 38rem;
      margin: 0 auto;
      line-height: 1.6;
    }
    .msg code { color: #e8a54b; }
  </style>
</head>
<body>
  <p class="kepler-hint">Kepler.gl may take up to a minute to load; wait for the map. This view is <strong>ensemble predictions only</strong> (cell color = <code>ensemble_prob</code>), built from GeoPandas + the same models as the training notebooks.</p>
  <div id="frame-wrap"></div>
  <script>
    (function () {
      var wrap = document.getElementById('frame-wrap');
      if (window.location.protocol === 'file:') {
        wrap.innerHTML = '<p class="msg">Kepler needs an <code>https://</code> or <code>http://</code> URL for the map data. From the <code>docs/</code> folder run <code>python -m http.server 8080</code> and open <code>http://localhost:8080/kepler_predictions.html</code>, or deploy to Vercel / GitHub Pages.</p>';
        return;
      }
      var jsonUrl = new URL('data/map/kepler_predictions.json', window.location.href).href;
      fetch(jsonUrl, { method: 'HEAD' })
        .then(function (r) {
          if (!r.ok) throw new Error('missing');
          var demo = 'https://kepler.gl/demo/map?mapUrl=' + encodeURIComponent(jsonUrl);
          var iframe = document.createElement('iframe');
          iframe.src = demo;
          iframe.title = 'Kepler.gl — predictions';
          iframe.setAttribute('loading', 'lazy');
          wrap.appendChild(iframe);
        })
        .catch(function () {
          wrap.innerHTML = '<p class="msg">Predictions map file not found. Generate locally: <code>uv run python scripts/export_kepler_predictions.py</code> (writes <code>docs/data/map/ensemble_predictions.geojson</code> and <code>docs/data/map/kepler_predictions.json</code>; needs parquet + <code>models/ensemble/</code>). Or rebuild Kepler only: <code>--from-geojson docs/data/map/ensemble_predictions.geojson</code>.</p>';
        });
    })();
  </script>
</body>
</html>
