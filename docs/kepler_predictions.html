<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predictions — Kepler.gl</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #1a0f18; display: flex; flex-direction: column; }
    .pred-ramp {
      flex-shrink: 0;
      height: 5px;
      width: 100%;
      background: linear-gradient(
        90deg,
        #f1eef6 0%,
        #d4b9da 16%,
        #c994c7 33%,
        #df65b0 50%,
        #e7298a 66%,
        #ce1256 83%,
        #91003f 100%
      );
    }
    #frame-wrap { flex: 1; min-height: 0; width: 100%; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
    .msg {
      font-family: system-ui, sans-serif;
      color: #94a3b8;
      padding: 2rem;
      max-width: 36rem;
      margin: 0 auto;
      line-height: 1.6;
    }
    .msg code { color: #df65b0; }
  </style>
</head>
<body>
  <div class="pred-ramp" role="presentation" title="ColorBrewer PuRd · ensemble_prob (quantile)"></div>
  <div id="frame-wrap"></div>
  <script>
    (function () {
      var wrap = document.getElementById('frame-wrap');
      if (window.location.protocol === 'file:') {
        wrap.innerHTML = '<p class="msg">Serve this folder over <code>http://</code> or <code>https://</code> so Kepler can load <code>data/map/kepler_predictions.json</code>.</p>';
        return;
      }
      var jsonUrl = new URL('data/map/kepler_predictions.json', window.location.href).href;
      fetch(jsonUrl, { method: 'HEAD' })
        .then(function (r) {
          if (!r.ok) throw new Error('missing');
          var iframe = document.createElement('iframe');
          iframe.src = 'https://kepler.gl/demo/map?mapUrl=' + encodeURIComponent(jsonUrl);
          iframe.title = 'Kepler.gl — ensemble probability (PuRd)';
          iframe.setAttribute('loading', 'lazy');
          wrap.appendChild(iframe);
        })
        .catch(function () {
          wrap.innerHTML = '<p class="msg">Missing <code>kepler_predictions.json</code>. Run <code>uv run python scripts/export_kepler_predictions.py</code>.</p>';
        });
    })();
  </script>
</body>
</html>
