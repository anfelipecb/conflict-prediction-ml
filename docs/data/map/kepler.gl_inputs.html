<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Data — Kepler.gl (map config)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0c1118; display: flex; flex-direction: column; }
    #frame-wrap { flex: 1; min-height: 0; width: 100%; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }
  </style>
</head>
<body>
  <div id="frame-wrap"></div>
  <script>
    (function () {
      var wrap = document.getElementById('frame-wrap');
      var INPUT_MAP_JSON_URL = 'https://dl.dropboxusercontent.com/scl/fi/h72duzw7g0s0zky11lxoo/keplergl_bkyf7mt.json?rlkey=15ddha0y08stj8n0xs2rqtl6r&dl=0';
      var demo = 'https://kepler.gl/demo/map?mapUrl=' + encodeURIComponent(INPUT_MAP_JSON_URL);
      var iframe = document.createElement('iframe');
      iframe.src = demo;
      iframe.title = 'Kepler.gl — input data';
      iframe.setAttribute('loading', 'lazy');
      wrap.appendChild(iframe);
    })();
  </script>
</body>
</html>
