# Publishes the static site under docs/ (including docs/index.html) to GitHub Pages.
# One-time: Repo Settings → Pages → Build: GitHub Actions (this workflow).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --all-groups
        env:
          UV_COMPILE_BYTECODE: "0"

      - name: Generate input data GeoJSON
        run: |
          uv run python scripts/generate_input_geojson.py \
            --output docs/input_data.geojson || true

      - name: Generate predictions GeoJSON
        run: |
          uv run python scripts/generate_predictions_geojson.py \
            --output docs/predictions.geojson || true

      - name: Generate Kepler predictions JSON (optional)
        run: uv run python scripts/export_kepler_predictions.py || true

      - name: Copy full report to docs
        run: cp milestones/milestone_6/final_doc.html docs/full_report.html

      - name: Copy report figures into docs (same paths as full_report.html)
        run: |
          mkdir -p docs/output
          # -L follows symlinks (e.g. confusion_* -> confussion_* / LR_confussion.png)
          cp -Lf output/*.png docs/output/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
