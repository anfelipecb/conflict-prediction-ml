# Deploys docs/ to Vercel on every push to main (same behavior as native “Git integration”
# when VERCEL_TOKEN is configured). Project IDs match the climate-conflict-ml project.
#
# One-time: GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   Name: VERCEL_TOKEN
#   Value: create at https://vercel.com/account/tokens (scope: Full Account or the team)
#
# Optional: connect the repo in the Vercel UI (Git → Connect) for PR previews; this workflow
# is enough for production deploys from main.

name: Deploy to Vercel

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-vercel.yml"
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy production
        working-directory: docs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # climate-conflict-ml (anfelipecbs-projects) — update if you recreate the project
          VERCEL_ORG_ID: team_f5AygrvbItanODerbsxiAMCK
          VERCEL_PROJECT_ID: prj_uY2y0NEeoiDD700q1cvdW4T8hdvY
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
